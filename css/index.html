<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de Noticias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="titulo-pagina">Portal de Noticias</h1>

    <div class="header">
        <h2>Noticias</h2>
    </div>
    
    <div class="nav">
        <span class="link">Inicio</span> &nbsp;&nbsp;&nbsp; 
        <span class="link">Deportes</span> &nbsp;&nbsp;&nbsp; 
        <span class="link">Tecnologia</span> &nbsp;&nbsp;&nbsp; 
        <span class="link">Politica</span>
    </div>

    <div class="main">
        
        <div class="section">
            <div class="noticia n1">
                <h2>Noticia 1</h2>
                <p>Hola</p>
            </div>
            
            <div class="noticia n2">
                <h2>Noticia 2 </h2>
                <p>Que</p>
            </div>

            <div class="noticia n3">
                <h2>Noticia 3</h2>
                <p>Tal?</p>
            </div>
        </div>
        
        <div class="aside">
            <h2>Noticias Extras</h2>
            <p>► Hola</p>
            <br>
            <p>► ¿Cómo estás?</p>
        </div>

    </div>

    <div class="article">
        <h2>Noticia Principal</h2>
        <p>A huevo</p>
    </div>

    <div class="footer">
        <h2>Footer</h2>
    </div>

</body>
</html>
